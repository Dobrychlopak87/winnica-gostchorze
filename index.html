  <style>
    #pwa-install-banner{
      position:fixed;
      left:50%;
      bottom:22px;
      transform:translate(-50%,140%);
      z-index:99999;
      width:min(440px,calc(100% - 32px));
      display:flex;
      align-items:center;
      gap:14px;
      padding:16px 18px;
      border-radius:16px;
      background:linear-gradient(155deg,#0a100dee,#08110dee);
      border:1px solid #c89b4a4d;
      box-shadow:0 12px 40px #00000066,0 0 0 1px #ffffff0d inset;
      backdrop-filter:blur(10px);
      -webkit-backdrop-filter:blur(10px);
      font-family:'Outfit',system-ui,sans-serif;
      color:#e9e1d2;
      opacity:0;
      transition:transform .55s cubic-bezier(.22,1,.36,1),opacity .55s ease;
      pointer-events:none;
    }
    #pwa-install-banner.pwa-show{
      transform:translate(-50%,0);
      opacity:1;
      pointer-events:auto;
    }
    #pwa-install-banner .pwa-icon{
      flex:0 0 auto;
      width:44px;
      height:44px;
      border-radius:12px;
      background:#c89b4a1a;
      border:1px solid #c89b4a4d;
      display:flex;
      align-items:center;
      justify-content:center;
    }
    #pwa-install-banner .pwa-icon img{
      width:26px;
      height:26px;
      display:block;
    }
    #pwa-install-banner .pwa-text{
      flex:1 1 auto;
      min-width:0;
    }
    #pwa-install-banner .pwa-title{
      font-size:14.5px;
      font-weight:600;
      letter-spacing:.01em;
      color:#ecd8a3;
      margin:0 0 2px;
    }
    #pwa-install-banner .pwa-sub{
      font-size:12.5px;
      font-weight:300;
      color:#e9e1d2b3;
      margin:0;
      line-height:1.35;
    }
    #pwa-install-banner .pwa-actions{
      flex:0 0 auto;
      display:flex;
      align-items:center;
      gap:8px;
    }
    #pwa-install-banner .pwa-install-btn{
      appearance:none;
      border:1px solid #c89b4a;
      background:linear-gradient(155deg,#c89b4a,#ecd8a3);
      color:#08110d;
      font-family:inherit;
      font-size:13px;
      font-weight:600;
      letter-spacing:.02em;
      padding:9px 16px;
      border-radius:999px;
      cursor:pointer;
      white-space:nowrap;
      transition:transform .2s ease,filter .2s ease;
    }
    #pwa-install-banner .pwa-install-btn:hover{ filter:brightness(1.08); transform:translateY(-1px); }
    #pwa-install-banner .pwa-close-btn{
      appearance:none;
      border:none;
      background:transparent;
      color:#e9e1d280;
      font-size:18px;
      line-height:1;
      width:26px;
      height:26px;
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      border-radius:50%;
      transition:color .2s ease,background .2s ease;
    }
    #pwa-install-banner .pwa-close-btn:hover{ color:#ecd8a3; background:#ffffff12; }
    @media (max-width:420px){
      #pwa-install-banner{ padding:14px; gap:10px; }
      #pwa-install-banner .pwa-icon{ width:38px; height:38px; }
      #pwa-install-banner .pwa-title{ font-size:13.5px; }
      #pwa-install-banner .pwa-sub{ font-size:11.5px; }
    }
    /* ===== REMOVE BACKGROUND FROM A VOTRE SANTE ===== */
    img[src*="na_zdrowie"]{background:transparent!important;mix-blend-mode:multiply;}
    .dark img[src*="na_zdrowie"],[data-theme="dark"] img[src*="na_zdrowie"]{mix-blend-mode:normal;filter:brightness(1.1);}
